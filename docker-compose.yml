version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=
      - CLERK_SECRET_KEY=
      - PUSHER_APP_ID=
      - NEXT_PUBLIC_PUSHER_KEY=
      - PUSHER_SECRET=
      - NEXT_PUBLIC_PUSHER_CLUSTER=
      - UPLOADTHING_SECRET=
      - UPLOADTHING_APP_ID=
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
